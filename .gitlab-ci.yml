include:
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/release.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/spellcheck.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/discord-notify.yml'

stages:
  - validate
  - tag
  - release
  - notify
  - renovate

default:
  tags:
    - self-hosted

# Static-analysis gate via tox (pylint + bandit). Lint-only by design — this is
# a single-file operational daemon, not a tested library, so there's no
# tox pytest/diff-cover matrix.
lint:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install --quiet tox
    - tox
  rules:
    # MR-only: main advances only via FF/squash merges of validated MRs (direct
    # push is blocked), so re-linting the merge commit is redundant. This keeps
    # the whole validate stage off the default-branch pipeline (matches
    # spellcheck/trufflehog), leaving merges to run tag -> release -> notify.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

spellcheck:
  extends: .spellcheck

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Auto-bump the patch version (and prepend a CHANGELOG entry) on Renovate MRs
# so each one merges as its own taggable version.
bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\//

# On merge to main: tag v<VERSION> (no-op if it exists) ...
tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

# ... and cut a GitLab Release from that tag, using the CHANGELOG section.
release:
  extends: .release
  stage: release
  needs:
    - job: tag-build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-release-failure:
  extends: .discord-notify
  stage: notify
  needs: [release]
  allow_failure: true
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Release job failed'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

# Scheduled pipeline (weekly schedule provisioned in terraform/infra) opens
# dependency-update MRs from renovate.json.
renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure
