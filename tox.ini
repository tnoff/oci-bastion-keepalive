[tox]
min_version = 4.0
env_list = lint

# Lint-only: this is a single-file operational daemon, not a tested library, so
# there's no pytest/coverage matrix (see MR !1). skip_install avoids pulling the
# heavy OCI SDK just to run static analysis — pylint treats `oci` as an ignored
# module (see .pylintrc) and bandit works on the AST.
[testenv:lint]
description = Static analysis (pylint + bandit)
skip_install = true
deps =
    pylint==4.0.6
    bandit==1.9.4
commands =
    pylint rotate_session.py
    bandit rotate_session.py
